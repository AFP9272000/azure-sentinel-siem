# Azure Sentinel SIEM - Azure DevOps CI/CD Pipeline
# Deploys Terraform + Bicep with security scanning

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: sentinel-siem-secrets
  - name: TF_VERSION
    value: "1.7.0"
  - name: resourceGroupName
    value: "rg-sentinel-siem"
  - name: workspaceName
    value: "law-sentinel-siem"

stages:

  # Stage 1: Security Scanning

  - stage: SecurityScan
    displayName: "Security Scan"
    jobs:
      - job: Scan
        displayName: "Run Security Scanners"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"

          - script: pip install checkov
            displayName: "Install Checkov"

          - script: curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
            displayName: "Install tfsec"

          - script: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
            displayName: "Install Trivy"

          - script: checkov -d terraform/ --output cli --soft-fail
            displayName: "Checkov - Terraform"
            continueOnError: true

          - script: checkov -d bicep/ --framework bicep --output cli --soft-fail
            displayName: "Checkov - Bicep"
            continueOnError: true

          - script: tfsec terraform/ -s
            displayName: "tfsec Scan"
            continueOnError: true

          - script: trivy fs . --severity HIGH,CRITICAL
            displayName: "Trivy Scan"
            continueOnError: true

  # Stage 2: Terraform

 - stage: Terraform
    displayName: "Terraform Deploy"
    dependsOn: SecurityScan
    jobs:
      - job: TerraformDeploy
        displayName: "Terraform Init/Plan/Apply"
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: "Terraform Init, Plan, Apply"
            inputs:
              azureSubscription: "sentinel-siem-service-connection"
              scriptType: "pscore"
              scriptLocation: "inlineScript"
              addSpnToEnvironment: true
              inlineScript: |
                $env:ARM_CLIENT_ID = $env:servicePrincipalId
                $env:ARM_TENANT_ID = $env:tenantId
                $env:ARM_SUBSCRIPTION_ID = az account show --query id -o tsv
                $env:ARM_USE_OIDC = "true"
                $env:ARM_OIDC_TOKEN = $env:idToken
                Set-Location terraform/
                terraform init
                terraform plan -out=tfplan -input=false -var="alert_email=$(ALERT_EMAIL)" -var="slack_webhook_url=$(SLACK_WEBHOOK_URL)"
                terraform apply -auto-approve tfplan

  # Stage 3: Bicep Deployment

  - stage: Bicep
    displayName: "Bicep Deploy"
    dependsOn: Terraform
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: BicepDeploy
        displayName: "Deploy Bicep Templates"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: "Deploy Bicep"
                  inputs:
                    azureSubscription: "sentinel-siem-service-connection"
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: az deployment group create --resource-group $(resourceGroupName) --template-file bicep/main.bicep --parameters workspaceName=$(workspaceName) alertEmail=$(ALERT_EMAIL) slackWebhookUrl=$(SLACK_WEBHOOK_URL)
