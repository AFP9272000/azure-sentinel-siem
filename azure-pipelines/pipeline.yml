# Azure Sentinel SIEM - Azure DevOps CI/CD Pipeline
# Deploys Terraform + Bicep with security scanning

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: sentinel-siem-secrets
  - name: TF_VERSION
    value: "1.7.0"
  - name: resourceGroupName
    value: "rg-sentinel-siem"
  - name: workspaceName
    value: "law-sentinel-siem"

stages:
 
  # Stage 1: Security Scanning

  - stage: SecurityScan
    displayName: "Security Scan"
    jobs:
      - job: Scan
        displayName: "Run Security Scanners"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"

          - script: |
              pip install checkov
              curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
            displayName: "Install Security Tools"

          - script: |
              checkov -d terraform/ --output cli --soft-fail
            displayName: "Checkov - Terraform"
            continueOnError: true

          - script: |
              checkov -d bicep/ --framework bicep --output cli --soft-fail
            displayName: "Checkov - Bicep"
            continueOnError: true

          - script: |
              tfsec terraform/ --soft-fail-on-all-errors
            displayName: "tfsec Scan"
            continueOnError: true

          - script: |
              trivy fs . --severity HIGH,CRITICAL
            displayName: "Trivy Scan"
            continueOnError: true


  # Stage 2: Terraform

  - stage: Terraform
    displayName: "Terraform Deploy"
    dependsOn: SecurityScan
    jobs:
      - job: TerraformDeploy
        displayName: "Terraform Init/Plan/Apply"
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AzureCLI@2
            displayName: "Terraform Init"
            inputs:
              azureSubscription: "sentinel-siem-service-connection"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                cd terraform/
                terraform init
              addSpnToEnvironment: true

          - task: AzureCLI@2
            displayName: "Terraform Plan"
            inputs:
              azureSubscription: "sentinel-siem-service-connection"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                cd terraform/
                terraform plan -out=tfplan \
                  -var="alert_email=$(ALERT_EMAIL)" \
                  -var="slack_webhook_url=$(SLACK_WEBHOOK_URL)"
              addSpnToEnvironment: true

          - task: AzureCLI@2
            displayName: "Terraform Apply"
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            inputs:
              azureSubscription: "sentinel-siem-service-connection"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                cd terraform/
                terraform apply -auto-approve tfplan
              addSpnToEnvironment: true

  # Stage 3: Bicep Deployment

  - stage: Bicep
    displayName: "Bicep Deploy"
    dependsOn: Terraform
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: BicepDeploy
        displayName: "Deploy Bicep Templates"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: "Deploy Bicep"
                  inputs:
                    azureSubscription: "sentinel-siem-service-connection"
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      az deployment group create \
                        --resource-group $(resourceGroupName) \
                        --template-file bicep/main.bicep \
                        --parameters \
                          workspaceName=$(workspaceName) \
                          alertEmail=$(ALERT_EMAIL) \
                          slackWebhookUrl=$(SLACK_WEBHOOK_URL)
